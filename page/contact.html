<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us - Bangla Real Estate</title>
  <link rel="stylesheet" href="../style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<main>
  <section class="py-5">
    <div class="container">
      <h2 class="text-center mb-5" style="color: #6d7587; font-weight: 600;">Contact Us</h2>
      
      <div class="neumorph-box">
        <form>
          <div class="mb-4">
            <label class="neumorph-label">আপনার নাম</label>
            <input type="text" class="neumorph-input" placeholder="নাম লিখুন" required>
          </div>

          <div class="mb-4">
            <label class="neumorph-label">ফোন নম্বর</label>
            <input type="tel" class="neumorph-input" placeholder="01XXXXXXXXX" required>
          </div>

          <div class="mb-4">
            <label class="neumorph-label">আপনি কি খুজছেন?</label>
            <textarea class="neumorph-input" rows="4" placeholder="জমি নাকি বাড়ি? লোকেশন?"></textarea>
          </div>

          <button type="submit" class="neumorph-btn">Send Message</button>
        </form>
      </div>

      <div class="text-center mt-5" style="color: #6d7587;">
        <p class="mb-1"><b>Call:</b> 01778662284</p>
        <p class="mb-1"><b>Email:</b> banglarealestate@gmail.com</p>
        <p><b>Address:</b> বামনা, বরগুনা</p>
      </div>
    </div>
  </section>
</main>
<footer class="bg-dark text-white text-center py-4">
  <div class="container"><p class="mb-0">© 2026 Bangla Real Estate. All Rights Reserved.</p></div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
